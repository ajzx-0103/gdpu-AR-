<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>校园AR全景漫游</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <p id="loading-text">加载中...</p>
  </div>

  <div id="container"></div>

  <div id="ui-overlay">
    <div id="top-bar">
      <button id="btn-menu" class="ui-btn" title="场景列表">☰</button>
      <div id="scene-title">校园全景漫游</div>
      <button id="btn-ar" class="ui-btn" title="AR模式">📱</button>
    </div>

    <div id="bottom-bar">
      <button id="btn-edit" class="ui-btn" title="编辑热点">✏️ 编辑</button>
      <button id="btn-sandbox" class="ui-btn" title="沙盘导览">🗺️ 沙盘</button>
      <button id="btn-audio" class="ui-btn" title="语音导览">🔇</button>
      <button id="btn-info" class="ui-btn" title="当前场景信息">ℹ️</button>
      <button id="btn-fullscreen" class="ui-btn" title="全屏">⛶</button>
    </div>

    <div id="hint-text" class="hint">点击热点跳转场景 · 沙盘导览</div>
  </div>

  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>场景列表</h2>
      <button id="btn-close-sidebar" class="ui-btn">✕</button>
    </div>
    <div class="sidebar-content" id="scene-list">
    </div>
  </div>

  <div id="info-panel" class="info-panel">
    <div class="info-panel-header">
      <h3 id="info-title">信息</h3>
      <button id="btn-close-info" class="ui-btn">✕</button>
    </div>
    <div class="info-panel-content" id="info-content">
    </div>
  </div>

  <div id="sandbox-panel" class="sandbox-panel">
    <div class="sandbox-header">
      <h3>校园沙盘</h3>
      <div>
        <button id="btn-close-sandbox" class="ui-btn">✕</button>
      </div>
    </div>
    <div class="sandbox-content">
      <canvas id="sandbox-canvas"></canvas>
      <p class="sandbox-tip" id="sandbox-tip">点击标记切换场景</p>
      <div id="sandbox-coords" style="display:none;margin-top:8px;max-height:120px;overflow-y:auto;font-size:11px;font-family:monospace;color:#ffcc02;background:rgba(0,0,0,0.5);border-radius:6px;padding:6px"></div>
    </div>
  </div>

  <div id="notification" class="notification hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
